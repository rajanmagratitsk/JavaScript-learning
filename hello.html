<!DOCTYPE html>
<html>
<head>
  <title>Simple JavaScript Program</title>
</head>
<body>
  <h2>JavaScript Greeting Example</h2>
  <button onclick="sayHello()">Click Me</button>

  <script>
    function sayHello() {
      let name = prompt("Enter your name:");
      alert("Hello, " + name + "! Welcome to JavaScript.");
    }
  </script>
</body>
</html>
