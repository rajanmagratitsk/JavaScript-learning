<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Operators</title>
</head>
<body>

    <h2>JavaScript Operators Example</h2>

    <script>
        let a = 10;
        let b = 5;
         document.write("<h3>Logical Operators</h3>");
        document.write("(a > b && b < a) : " + (a > b && b < a) + "<br>");
        document.write("(a < b || a > b) : " + (a < b || a > b) + "<br>");
    </script>

</body>
</html>
