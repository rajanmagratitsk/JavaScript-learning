<!DOCTYPE html>
<html>
<head>
  <title>Current Time Display</title>
</head>
<body>
  <h2>Current Time</h2>
  <p id="time"></p>
  <p id="details"></p>

  <script>
    function showTime() {
      let now = new Date();

      // Extract parts
      let hours = now.getHours();
      let minutes = now.getMinutes();
      let seconds = now.getSeconds();
      let day = now.getDate();
      let month = now.getMonth() + 1; // Months are 0-based
      let year = now.getFullYear();

      // Format time
      let currentTime = hours + ":" + minutes + ":" + seconds;

      // Show in HTML
      document.getElementById("time").innerHTML = "Current Time: " + currentTime;
      document.getElementById("details").innerHTML =
        "Hour: " + hours + "<br>" +
        "Minute: " + minutes + "<br>" +
        "Second: " + seconds + "<br>" +
        "Day: " + day + "<br>" +
        "Month: " + month + "<br>" +
        "Year: " + year;
    }

    // Update every second
    setInterval(showTime, 1000);
  </script>
</body>
</html>
